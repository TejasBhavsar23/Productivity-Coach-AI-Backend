# =============================================
# AI PRODUCTIVITY COACH - APPLICATION CONFIG
# MySQL Edition
# =============================================

# --- Server ---
server.port=8080
server.servlet.context-path=/api/v1

# --- Application Name ---
spring.application.name=ai-productivity-coach

# --- MySQL Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/habbit_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# ✅ FIXED: Changed from PostgreSQLDialect to MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT Configuration ---
app.jwt.secret=ThisIsAVeryLongAndSecureSecretKeyForJWTTokenGenerationInProductionYouShouldReplaceThis
app.jwt.expiration-ms=86400000

# --- Claude AI (Anthropic) API ---
ai.provider=claude
ai.claude.api-key=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
ai.claude.base-url=https://openrouter.ai/api/v1
ai.claude.model=inclusionai/ling-2.6-1t:free
ai.claude.max-tokens=2048
ai.claude.api-version=2023-06-01

# --- OpenAI API (Alternative) ---
ai.openai.api-key=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
ai.openai.base-url=https://openrouter.ai/api/v1
ai.openai.model=inclusionai/ling-2.6-1t:free
ai.openai.max-tokens=2048

# --- WebClient Timeouts ---
webclient.connect-timeout-ms=10000
webclient.read-timeout-ms=60000
webclient.write-timeout-ms=10000

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method

# --- Logging ---
logging.level.com.productivitycoach=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/productivity-coach.log
